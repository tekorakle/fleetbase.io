name: Release

# Triggered by pushing a `vX.Y.Z` tag to main (typically after merging a
# release/vX.Y.Z PR). Validates that package.json and CHANGELOG.md agree
# with the tag, then publishes a GitHub Release whose body is the matching
# CHANGELOG section.
#
# Pre-release tags (e.g. `v0.2.0-beta.1`, `v1.0.0-rc.1`) are auto-flagged
# as pre-releases on GitHub.
#
# To cut a release:
#   1. Merge the release/vX.Y.Z PR into main.
#   2. git checkout main && git pull
#   3. git tag vX.Y.Z && git push origin vX.Y.Z
#   This workflow does the rest.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Tag:        $tag"
          echo "Version:    $version"

      - name: Verify package.json version matches tag
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "✓ package.json version matches tag: $pkg_version"

      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          # Pull lines between `## [VERSION]` and the next `## [` heading.
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/         { exit }
            found                     { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md section found for version $version. Add a '## [$version]' entry before tagging."
            exit 1
          fi

          # Multi-line outputs require a heredoc delimiter.
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "✓ Found CHANGELOG entry for $version ($(echo "$notes" | wc -l) lines)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
