name: SEO Content Agent

on:
  schedule:
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: Optional topic override for a manual run
        required: false
        type: string
      keyword:
        description: Optional target keyword override for a manual run
        required: false
        type: string
      dry_run:
        description: Generate artifacts without creating a Ghost draft
        required: true
        default: false
        type: boolean
      max_drafts:
        description: Maximum Ghost drafts to create
        required: true
        default: '1'
        type: choice
        options:
          - '1'
      content_focus:
        description: Optional content focus override
        required: true
        default: auto
        type: choice
        options:
          - auto
          - logistics-software
          - supply-chain-software
          - fleetbase-api-tutorial
      generate_feature_image:
        description: Generate and attach an OpenAI feature image when creating the Ghost draft
        required: true
        default: true
        type: boolean
      generate_feature_image_in_dry_run:
        description: Also call OpenAI Images during dry runs
        required: true
        default: false
        type: boolean
      allow_seed_fallback:
        description: Allow continuing without Ahrefs results
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  generate:
    name: Generate SEO content draft
    runs-on: ubuntu-latest
    env:
      AHREFS_API_TOKEN: ${{ secrets.AHREFS_API_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1.5' }}
      GHOST_ADMIN_API_URL: ${{ secrets.GHOST_ADMIN_API_URL }}
      GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
      GHOST_API_URL: ${{ secrets.GHOST_API_URL }}
      GHOST_CONTENT_API_KEY: ${{ secrets.GHOST_CONTENT_API_KEY }}
      GHOST_API_VERSION: ${{ vars.GHOST_API_VERSION || 'v5.0' }}
      CONTENT_AGENT_NOTIFY_WEBHOOK_URL: ${{ secrets.CONTENT_AGENT_NOTIFY_WEBHOOK_URL }}
      CONTENT_AGENT_TOPIC: ${{ inputs.topic || '' }}
      CONTENT_AGENT_KEYWORD: ${{ inputs.keyword || '' }}
      CONTENT_AGENT_FOCUS: ${{ inputs.content_focus || 'auto' }}
      CONTENT_AGENT_MAX_DRAFTS: ${{ inputs.max_drafts || '1' }}
      CONTENT_AGENT_OUTPUT_DIR: content-agent-output
      CONTENT_AGENT_ALLOW_SEED_FALLBACK: ${{ inputs.allow_seed_fallback != false }}
      CONTENT_AGENT_MAX_AHREFS_CLUSTERS: 3
      CONTENT_AGENT_MAX_AHREFS_ROWS: 10
      CREATE_GHOST_DRAFT: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
      GENERATE_FEATURE_IMAGE: ${{ inputs.generate_feature_image }}
      GENERATE_FEATURE_IMAGE_IN_DRY_RUN: ${{ inputs.generate_feature_image_in_dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout core-api source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/core-api
          path: source-truth/core-api
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout fleetops source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/fleetops
          path: source-truth/fleetops
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout ledger source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/ledger
          path: source-truth/ledger
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout storefront source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/storefront
          path: source-truth/storefront
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout dev-engine source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/dev-engine
          path: source-truth/dev-engine
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout iam-engine source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/iam-engine
          path: source-truth/iam-engine
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout ember-core source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/ember-core
          path: source-truth/ember-core
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Checkout pallet source truth
        uses: actions/checkout@v4
        with:
          repository: fleetbase/pallet
          path: source-truth/pallet
          token: ${{ secrets.FLEETBASE_SOURCE_READ_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run content agent self-tests
        run: pnpm content-agent:test

      - name: Prepare content research
        run: pnpm content-agent:prepare

      - name: Generate draft with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Fleetbase SEO content agent. Your only job is to inspect this checked-out workspace and write structured article artifacts for a human-reviewed Ghost draft. Do not commit, push, create issues, create PRs, call external APIs, publish, schedule, or ask follow-up questions.

            Read `content-agent-output/research-input.json` first. It contains Ahrefs opportunities, duplicate-filtered existing Ghost content, Fleetbase editorial rules, source-truth repo paths, and the source manifest.

            Select one non-duplicate opportunity from the first 10 `ahrefs.opportunities` entries. Prefer the first opportunity unless it is already covered by `existingGhostContent` or cannot be supported by source files. The topic must be specific to Fleetbase, Fleet-Ops, last-mile delivery software, delivery management, dispatch, proof of delivery, route optimization, driver tracking, or a practical Fleetbase API/tutorial workflow.

            Inspect only the files needed to support the selected article. Start from `sourceManifest` paths that match the selected keyword, then inspect relevant files under `content/docs`, `src/app`, `source-truth/core-api`, `source-truth/fleetops`, and `vendor/postman`. Only inspect Pallet, Storefront, Ledger, dev-engine, iam-engine, or ember-core if the selected opportunity directly needs them. For API/tutorial claims, verify endpoints, request fields, response shape, and UI names against source, docs, or Postman collections.

            Work quickly and write artifacts as soon as the article is source-supported. Do not perform broad repository audits. Do not optimize code. Do not run package installs. Do not run tests.

            Write exactly these JSON files under `content-agent-output/`:
            - `topic.json`: one object matching keyword, cluster, title, score, searchIntent, businessFit, opportunity, competitorWeakness, cannibalizationRisk, rationale, suggestedInternalLinks.
            - `brief.json`: one object with title, slug, targetKeyword, secondaryKeywords, audience, searchIntent, thesis, outline, internalLinks, cta, metaTitle, metaDescription, publicTags, sourceNotes.
            - `draft.json`: one object with title, slug, excerpt, html, metaTitle, metaDescription, publicTags, targetKeyword, ahrefsOpportunity, sourceCitations. The HTML must be semantic Ghost-compatible HTML.
            - `source-citations.json`: an array of citation objects with repo, path, title, claim, and evidence.
            - `qa.json`: one object with publishReady, score, blockingIssues, warnings, recommendedFixes. Put factual uncertainties in warnings, not blockingIssues.
            - `feature-image-brief.json` when feature images are enabled: prompt, altText, filename.

            Hard requirements:
            - Use `https://fleetbase.io` for the website and `https://fleetbase.io/docs` for docs. Never use `fleetbase.ghost.io`.
            - Spell Fleet-Ops exactly as `Fleet-Ops`.
            - Do not use outdated `API-first` positioning.
            - Do not invent endpoints, parameters, SocketCluster channel formats, hostnames, UI screens, or Fleetbase product behavior.
            - Cite exact source files for claims. At least one source citation is required.
            - Keep the article useful for a human editor, but do not publish or schedule anything.
          claude_args: "--max-turns 40 --model ${{ env.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}"

      - name: Create Ghost draft from Claude Code artifacts
        run: pnpm content-agent:generate

      - name: Upload content agent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-agent-output
          path: content-agent-output
          if-no-files-found: ignore
